name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. СКАЧИВАНИЕ КОДА (ИСПРАВЛЕННАЯ ВЕРСИЯ)
      - name: Checkout code
        uses: actions/checkout@v5  # Обновлено до v5
        with:
          ref: ${{ github.ref }} # <--- ЭТА СТРОКА ФИКСИТ ПРОБЛЕМУ ВЕТКИ
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0
          clean: true # Принудительная очистка перед скачиванием

      # 2. УСТАНОВКА FLUTTER
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # 3. ЗАВИСИМОСТИ
      - name: Install dependencies
        run: flutter pub get

      # 4. НАСТРОЙКА JAVA (ЯВНО УКАЗЫВАЕМ ВЕРСИЮ)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 5. СОЗДАНИЕ КЛЮЧА ПОДПИСИ
      - name: Create Keystore
        run: |
          mkdir -p android/app
          keytool -genkey -v -keystore android/app/upload-keystore.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias upload \
            -storepass android -keypass android \
            -dname "CN=Test, OU=Test, O=Test, L=Test, S=Test, C=US"
          
          echo "storeFile=upload-keystore.jks" >> android/gradle.properties
          echo "storePassword=android" >> android/gradle.properties
          echo "keyAlias=upload" >> android/gradle.properties
          echo "keyPassword=android" >> android/gradle.properties

      # 6. СБОРКА APK
      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      # 7. ЗАГРУЗКА РЕЗУЛЬТАТА
      - name: Upload Artifact
        uses: actions/upload-artifact@v4.4.0 # Обновлено до последней версии
        with:
          name: messenger-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 5
          if-no-files-found: error