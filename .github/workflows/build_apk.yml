name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 👇 НОВЫЙ ШАГ: Чиним проблему безопасной директории Git
      - name: Fix Git Safe Directory
        run: |
          git config --global --add safe.directory /__w/messenger-app/messenger-app
          git config --global --add safe.directory '*'

      # Шаг скачивания кода
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0
          clean: true

      # Остальные шаги без изменений
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Keystore
        run: |
          mkdir -p android/app
          keytool -genkey -v -keystore android/app/upload-keystore.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias upload \
            -storepass android -keypass android \
            -dname "CN=Test, OU=Test, O=Test, L=Test, S=Test, C=US"
          
          echo "storeFile=upload-keystore.jks" >> android/gradle.properties
          echo "storePassword=android" >> android/gradle.properties
          echo "keyAlias=upload" >> android/gradle.properties
          echo "keyPassword=android" >> android/gradle.properties

      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: messenger-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 5
          if-no-files-found: error